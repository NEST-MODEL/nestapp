<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEST | Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #FF8C42; }
        .bg-accent { background-color: var(--accent-color); }
        .text-accent { color: var(--accent-color); }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { bg: '#111111', card: '#1A1A1A', accent: '#FF8C42' } } } }
    </script>
</head>
<body class="bg-bg text-white flex h-screen overflow-hidden font-sans">

    <aside class="w-[80px] bg-bg border-r border-[#1A1A1A] flex flex-col items-center py-6 gap-6">
        <div class="w-12 h-12 bg-accent rounded-2xl flex items-center justify-center font-bold text-black cursor-pointer">N</div>
        
        <button onclick="renderPage('feed')" class="w-12 h-12 bg-card rounded-xl hover:bg-accent/20 transition-all text-xl">🏠</button>
        <button onclick="renderPage('chats')" class="w-12 h-12 bg-card rounded-xl hover:bg-accent/20 transition-all text-xl">💬</button>
        
        <div class="mt-auto relative">
            <button onclick="toggleSettings()" class="w-12 h-12 bg-card rounded-xl hover:bg-accent transition-all text-xl">⚙️</button>
            <div id="settingsMenu" class="hidden absolute bottom-16 left-2 w-48 bg-[#1A1A1A] border border-white/10 rounded-2xl p-2 shadow-2xl z-50">
                <button onclick="renderPage('profile')" class="w-full text-left p-3 hover:bg-[#252525] rounded-xl">👤 Профиль</button>
                <button onclick="renderPage('custom')" class="w-full text-left p-3 hover:bg-[#252525] rounded-xl">🎨 Кастомизация</button>
                <button onclick="logout()" class="w-full text-left p-3 text-red-400 hover:bg-red-500/10 rounded-xl">🚪 Выход</button>
            </div>
        </div>
    </aside>

    <main id="app" class="flex-1 overflow-y-auto p-8">
        <h1 class="text-3xl font-bold">Добро пожаловать в NEST</h1>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
