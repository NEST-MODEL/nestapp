<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Coffee — касса и склад</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
  :root{
    --white:#ffffff;
    --bg:#f2f8fc;
    --blue-50:#eaf5fc;
    --blue-100:#d7ecf8;
    --blue-200:#b9defa;
    --blue-400:#5aa9e6;
    --blue-500:#3b82c4;
    --blue-600:#2a679f;
    --cyan-400:#5cc9c2;
    --ink:#1c2b3a;
    --muted:#6b8299;
    --line:#dceefa;
    --danger:#e35d6a;
    --danger-bg:#fdecee;
    --success:#33ab7a;
    --success-bg:#e7f7ef;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow-sm: 0 2px 10px rgba(59,130,196,0.08);
    --shadow-md: 0 12px 32px rgba(59,130,196,0.14);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand,.num{font-family:'Manrope',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select{font-family:inherit;}
  ::selection{background:var(--blue-200);}
  #app{min-height:100vh;}

  .boot-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .boot-mark{width:60px;height:60px;border-radius:18px;background:var(--blue-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(0.92);opacity:.7;}}
  .boot-text{color:var(--muted);font-size:13px;font-weight:600;}
  .boot-error{max-width:420px;text-align:center;background:var(--white);border:1px solid var(--line);border-radius:var(--radius-md);padding:28px;color:var(--ink);}
  .boot-error h3{margin:0 0 8px;}
  .boot-error p{color:var(--muted);font-size:13px;margin:0;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:48px 44px;width:100%;max-width:440px;text-align:center;border:1px solid var(--line);}
  .brand-mark{width:64px;height:64px;border-radius:20px;margin:0 auto 18px;background:var(--blue-500);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 10px 24px rgba(59,130,196,0.35);}
  .brand{font-size:26px;font-weight:800;margin:0 0 4px;letter-spacing:-0.02em;}
  .login-sub{color:var(--muted);margin:0 0 30px;font-size:14px;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px;}
  .role-btn{background:var(--blue-50);border:2px solid transparent;border-radius:var(--radius-md);padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .18s ease;}
  .role-btn:hover{border-color:var(--blue-400);transform:translateY(-2px);background:var(--white);box-shadow:var(--shadow-sm);}
  .role-btn.active{border-color:var(--blue-500);background:var(--white);box-shadow:var(--shadow-sm);}
  .role-icon{font-size:26px;}
  .role-label{font-weight:700;font-size:14px;}
  .kassa-select{margin-top:22px;text-align:left;}
  .kassa-select label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .kassa-empty{margin-top:10px;padding:16px;background:var(--blue-50);border-radius:var(--radius-sm);color:var(--muted);font-size:13px;text-align:center;}
  .kassa-option{display:flex;justify-content:space-between;align-items:center;background:var(--blue-50);border:2px solid transparent;border-radius:var(--radius-sm);padding:12px 16px;margin-top:8px;transition:.15s;}
  .kassa-option:hover{border-color:var(--blue-400);}
  .kassa-option.active{border-color:var(--blue-500);background:var(--white);}
  .kassa-option .k-num{font-weight:800;color:var(--blue-600);}
  .kassa-option .k-addr{font-size:12px;color:var(--muted);}
  .enter-btn{width:100%;margin-top:26px;padding:15px;border-radius:var(--radius-sm);background:var(--ink);color:#fff;font-weight:700;font-size:15px;transition:.15s;opacity:.4;pointer-events:none;}
  .enter-btn.ready{opacity:1;pointer-events:all;background:var(--blue-500);box-shadow:0 10px 22px rgba(59,130,196,0.35);}
  .enter-btn.ready:hover{transform:translateY(-1px);background:var(--blue-600);}

  .shell{display:flex;min-height:100vh;}
  .sidebar{width:230px;flex-shrink:0;background:var(--white);border-right:1px solid var(--line);padding:26px 18px;display:flex;flex-direction:column;}
  .sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:34px;padding:0 6px;}
  .sb-brand .brand-mark{width:38px;height:38px;border-radius:12px;font-size:18px;margin:0;}
  .sb-brand span{font-weight:800;font-size:16px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);color:var(--muted);font-weight:600;font-size:14px;margin-bottom:4px;background:transparent;width:100%;text-align:left;transition:.15s;}
  .nav-item:hover{background:var(--blue-50);color:var(--ink);}
  .nav-item.active{background:var(--blue-500);color:#fff;}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sb-foot{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);}
  .who{font-size:12px;color:var(--muted);padding:0 6px 10px;}
  .logout-btn{width:100%;padding:10px;border-radius:var(--radius-sm);background:var(--danger-bg);color:var(--danger);font-weight:700;font-size:13px;}
  .logout-btn:hover{background:#fbdadd;}

  .main{flex:1;padding:30px 36px;max-width:1400px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-head h1{font-size:24px;margin:0 0 4px;letter-spacing:-0.01em;}
  .page-head .sub{color:var(--muted);font-size:13px;margin:0;}

  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--line);box-shadow:var(--shadow-sm);}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:26px;}
  .stat-card{padding:22px;border-radius:var(--radius-lg);}
  .stat-card.hero{background:var(--blue-500);color:#fff;box-shadow:var(--shadow-md);border-color:transparent;}
  .stat-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;opacity:.85;}
  .stat-value{font-size:28px;font-weight:800;}
  .stat-card:not(.hero) .stat-label{color:var(--muted);opacity:1;}
  .stat-card:not(.hero) .stat-value{color:var(--ink);}

  .kassa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:28px;}
  .kassa-card{padding:22px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;}
  .kassa-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--blue-200);}
  .kassa-card .kc-num{display:inline-block;background:var(--blue-50);color:var(--blue-600);font-weight:800;padding:4px 12px;border-radius:100px;font-size:13px;margin-bottom:12px;}
  .kassa-card .kc-addr{font-weight:700;font-size:15px;margin-bottom:14px;color:var(--ink);}
  .kassa-card .kc-total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .kassa-card .kc-total{font-size:22px;font-weight:800;color:var(--blue-600);margin-top:2px;}

  .section-title{font-size:16px;font-weight:800;margin:0 0 14px;}

  .wh-table{width:100%;border-collapse:collapse;}
  .wh-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--line);}
  .wh-table td{padding:10px 14px;border-bottom:1px solid var(--blue-50);font-size:14px;vertical-align:middle;}
  .wh-table tr:last-child td{border-bottom:none;}
  .cat-pill{background:var(--blue-50);color:var(--blue-600);font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
  .stock-pill{font-weight:700;padding:3px 10px;border-radius:100px;font-size:12px;}
  .stock-ok{background:var(--success-bg);color:var(--success);}
  .stock-low{background:#fff4de;color:#b6821b;}
  .stock-out{background:var(--danger-bg);color:var(--danger);}
  .mini-input{width:70px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;text-align:center;}
  .mini-input:focus{outline:2px solid var(--blue-400);border-color:transparent;}
  .icon-btn{width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;background:var(--blue-50);color:var(--blue-600);font-size:14px;margin-right:4px;}
  .icon-btn:hover{background:var(--blue-100);}
  .icon-btn.del{background:var(--danger-bg);color:var(--danger);}
  .icon-btn.del:hover{background:#fbdadd;}
  .icon-btn.save{background:var(--success-bg);color:var(--success);}
  .icon-btn[disabled]{opacity:.4;pointer-events:none;}

  .add-row-form{display:flex;flex-wrap:wrap;gap:10px;padding:16px;background:var(--blue-50);border-radius:var(--radius-md);margin-top:18px;}
  .add-row-form input,.add-row-form select{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff;}
  .primary-btn{background:var(--blue-500);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:10px;box-shadow:0 8px 18px rgba(59,130,196,.28);}
  .primary-btn:hover{background:var(--blue-600);}
  .primary-btn[disabled]{opacity:.5;pointer-events:none;}
  .ghost-btn{background:var(--white);border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:13px;padding:9px 16px;border-radius:10px;}
  .ghost-btn:hover{background:var(--blue-50);}

  .filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-bar select{padding:9px 14px;border-radius:10px;border:1px solid var(--line);font-size:13px;background:#fff;}
  .receipt-row{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--blue-50);cursor:pointer;transition:.15s;}
  .receipt-row:last-child{border-bottom:none;}
  .receipt-row:hover{background:var(--blue-50);}
  .rr-left{display:flex;align-items:center;gap:14px;}
  .rr-icon{width:38px;height:38px;border-radius:12px;background:var(--blue-50);color:var(--blue-600);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .rr-id{font-weight:700;font-size:14px;}
  .rr-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .rr-total{font-weight:800;font-size:15px;color:var(--blue-600);}
  .empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty-state .e-icon{font-size:34px;margin-bottom:10px;}

  .pos-shell{display:flex;gap:22px;align-items:flex-start;}
  .pos-main{flex:1;min-width:0;}
  .cat-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .cat-tab{padding:9px 18px;border-radius:100px;background:var(--white);border:1px solid var(--line);font-weight:600;font-size:13px;color:var(--muted);transition:.15s;}
  .cat-tab:hover{border-color:var(--blue-400);color:var(--ink);}
  .cat-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;}
  .product-card{background:var(--white);border-radius:var(--radius-md);padding:16px;border:1px solid var(--line);display:flex;flex-direction:column;gap:8px;transition:.15s;position:relative;}
  .product-card:not(.out):hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--blue-200);}
  .product-card.out{opacity:.5;filter:grayscale(.3);}
  .p-emoji{font-size:30px;}
  .p-name{font-weight:700;font-size:14px;line-height:1.25;}
  .p-price{font-weight:800;color:var(--blue-600);font-size:15px;}
  .p-stock{font-size:11px;color:var(--muted);}
  .p-add-btn{margin-top:2px;padding:8px;border-radius:10px;background:var(--blue-50);color:var(--blue-600);font-weight:700;font-size:13px;}
  .p-add-btn:hover{background:var(--blue-500);color:#fff;}
  .out-badge{position:absolute;top:10px;right:10px;background:var(--danger-bg);color:var(--danger);font-size:10px;font-weight:800;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.03em;}

  .cart-panel{width:340px;flex-shrink:0;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--line);box-shadow:var(--shadow-md);padding:22px;position:sticky;top:24px;display:flex;flex-direction:column;max-height:calc(100vh - 48px);}
  .cart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .cart-head h3{margin:0;font-size:16px;}
  .cart-kassa-tag{font-size:11px;color:var(--blue-600);background:var(--blue-50);padding:4px 10px;border-radius:100px;font-weight:700;}
  .cart-items{flex:1;overflow-y:auto;margin:14px 0;min-height:60px;}
  .cart-empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}
  .cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--blue-50);gap:8px;}
  .ci-name{font-weight:600;font-size:13px;}
  .ci-price{font-size:11px;color:var(--muted);}
  .qty-ctrl{display:flex;align-items:center;gap:6px;}
  .qty-btn{width:24px;height:24px;border-radius:8px;background:var(--blue-50);color:var(--blue-600);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .qty-btn:hover{background:var(--blue-100);}
  .qty-num{font-weight:700;font-size:13px;width:16px;text-align:center;}
  .cart-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px dashed var(--line);}
  .cart-total-label{font-size:13px;color:var(--muted);font-weight:600;}
  .cart-total-num{font-size:24px;font-weight:800;color:var(--blue-600);}
  .pay-btn{width:100%;margin-top:16px;padding:15px;border-radius:var(--radius-sm);font-weight:800;font-size:15px;color:#fff;background:var(--blue-500);box-shadow:0 12px 26px rgba(59,130,196,.35);opacity:.4;pointer-events:none;}
  .pay-btn.ready{opacity:1;pointer-events:all;}
  .pay-btn.ready:hover{background:var(--blue-600);}
  .pay-btn.loading{opacity:.7;pointer-events:none;}
  .clear-cart-btn{width:100%;margin-top:8px;padding:9px;border-radius:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;}
  .clear-cart-btn:hover{color:var(--danger);}

  .modal-overlay{position:fixed;inset:0;background:rgba(28,43,58,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .18s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .receipt-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:360px;padding:0;overflow:hidden;box-shadow:0 24px 60px rgba(20,40,60,.35);animation:popIn .22s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes popIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .receipt-top{background:var(--blue-500);color:#fff;padding:26px 26px 20px;text-align:center;}
  .receipt-top .r-check{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;}
  .receipt-top h2{margin:0;font-size:17px;}
  .receipt-top p{margin:4px 0 0;font-size:12px;opacity:.85;}
  .receipt-body{padding:22px 26px;}
  .r-meta-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .r-meta-row b{color:var(--ink);font-weight:700;}
  .r-divider{border-top:1px dashed var(--line);margin:14px 0;}
  .r-item{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
  .r-item .ri-name{color:var(--ink);}
  .r-item .ri-qty{color:var(--muted);}
  .r-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);}
  .r-total-row .rt-label{font-weight:700;font-size:14px;}
  .r-total-row .rt-num{font-weight:800;font-size:20px;color:var(--blue-600);}
  .receipt-foot{padding:0 26px 26px;}
  .receipt-close-btn{width:100%;padding:13px;border-radius:12px;background:var(--ink);color:#fff;font-weight:700;font-size:14px;}
  .receipt-close-btn:hover{background:#0f1c28;}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:0 12px 26px rgba(0,0,0,.25);z-index:200;animation:fadeIn .2s ease;max-width:80vw;text-align:center;}
  .toast.error{background:var(--danger);}

  @media (max-width:900px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:14px 18px;overflow-x:auto;}
    .sb-brand{margin-bottom:0;margin-right:14px;}
    .sb-foot{display:none;}
    .nav-item{white-space:nowrap;}
    .main{padding:20px;}
    .pos-shell{flex-direction:column;}
    .cart-panel{width:100%;position:static;max-height:none;}
  }
</style>
</head>

const SEED_KASSAS = [
  {id:'32', address:'Кунаева 67', total:0},
  {id:'2', address:'Адырбекова 7', total:0},
];

async function seedIfEmpty(){
  const [prodSnap, kassaSnap] = await Promise.all([productsCol.limit(1).get(), kassasCol.limit(1).get()]);
  const batch = firestore.batch();
  let needsCommit = false;
  if(prodSnap.empty){ SEED_PRODUCTS.forEach(p => { batch.set(productsCol.doc(), p); needsCommit = true; }); }
  if(kassaSnap.empty){ SEED_KASSAS.forEach(k => { batch.set(kassasCol.doc(k.id), {address:k.address, total:k.total}); needsCommit = true; }); }
  if(needsCommit) await batch.commit();
}

function attachListeners(){
  productsCol.orderBy('category').onSnapshot(snap => {
    CACHE.products = snap.docs.map(d => ({id:d.id, ...d.data()}));
    LOADED.products = true; render();
  }, err => { BOOT_ERROR = err.message; render(); });

  kassasCol.onSnapshot(snap => {
    CACHE.kassas = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=> a.id.localeCompare(b.id, undefined, {numeric:true}));
    LOADED.kassas = true; render();
  }, err => { BOOT_ERROR = err.message; render(); });

  receiptsCol.orderBy('createdAt', 'desc').limit(300).onSnapshot(snap => {
    CACHE.receipts = snap.docs.map(d => ({id:d.id, ...d.data()}));
    LOADED.receipts = true; render();
  }, err => { BOOT_ERROR = err.message; render(); });
}

async function bootstrap(){
  try{ await seedIfEmpty(); attachListeners(); }
  catch(err){ BOOT_ERROR = err.message; render(); }
}

function render(){
  const app = document.getElementById('app');

  if(BOOT_ERROR){
    app.innerHTML = `<div class="boot-screen"><div class="boot-error"><h3>Не удалось подключиться к базе</h3><p>${BOOT_ERROR}</p></div></div>`;
    return;
  }
  if(!LOADED.products || !LOADED.kassas){
    app.innerHTML = `<div class="boot-screen"><div class="boot-mark">☕</div><div class="boot-text">Загружаем данные Global Coffee…</div></div>`;
    return;
  }

  let html = '';
  if(STATE.view === 'login') html = renderLogin();
  else if(STATE.view === 'admin') html = renderAdmin();
  else if(STATE.view === 'barista') html = renderBarista();

  if(STATE.modalReceipt) html += renderReceiptModal(STATE.modalReceipt);
  if(STATE.toast) html += `<div class="toast ${STATE.toastIsError?'error':''}">${STATE.toast}</div>`;

  app.innerHTML = html;
}

async function saveProductRow(id){
  const p = CACHE.products.find(x=>x.id===id);

  const patch = {};
  if(!isNaN(price)) patch.price = Math.max(0,price);
  if(!isNaN(stock)) patch.stock = Math.max(0,stock);
  try{ await productsCol.doc(id).update(patch); showToast(`«${p.name}» обновлён`); }
  catch(err){ showToast('Ошибка сохранения: ' + err.message, true); }
}

  const p = CACHE.products.find(x=>x.id===id);

    </div>`;

function addToCart(productId){
  const p = CACHE.products.find(x=>x.id===productId);
  if(!p || p.stock===0) return;
  const existing = STATE.cart.find(i=>i.productId===productId);
  if(existing){ if(existing.qty < p.stock) existing.qty++; }
  else{ STATE.cart.push({ productId: p.id, name: p.name, price: p.price, qty: 1, unit: p.unit, emoji: p.emoji }); }
  render();
}

function changeQty(productId, delta){
  const p = CACHE.products.find(x=>x.id===productId);
  const item = STATE.cart.find(i=>i.productId===productId);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0){ STATE.cart = STATE.cart.filter(i=>i.productId!==productId); }
  else if(p && item.qty > p.stock){ item.qty = p.stock; }
  render();
}

function clearCart(){ STATE.cart = []; render(); }

async function payOrder(){
  if(STATE.cart.length===0 || STATE.paying) return;
  STATE.paying = true; render();
  const cartSnapshot = STATE.cart.map(i=>({...i}));
  const kassaId = STATE.kassaId;
  const kassaRef = kassasCol.doc(kassaId);
  const counterRef = metaCol.doc('counters');
  const receiptRef = receiptsCol.doc();
  try{
    const receiptDisplay = await firestore.runTransaction(async (tx) => {
      const productRefs = cartSnapshot.map(i => productsCol.doc(i.productId));
      const productDocs = await Promise.all(productRefs.map(r => tx.get(r)));
      const kassaDoc = await tx.get(kassaRef);
      const counterDoc = await tx.get(counterRef);
      if(!kassaDoc.exists) throw new Error('Касса не найдена — возможно, её удалили');
      for(let idx=0; idx<productDocs.length; idx++){
        const pdoc = productDocs[idx]; const item = cartSnapshot[idx];
        if(!pdoc.exists) throw new Error(`Товар «${item.name}» больше не существует на складе`);
        const stock = pdoc.data().stock || 0;
        if(stock < item.qty) throw new Error(`«${item.name}» — на складе осталось только ${stock} шт, обновите заказ`);
      }
      const total = cartSnapshot.reduce((s,i)=>s+i.price*i.qty,0);
      const nextSeq = (counterDoc.exists ? (counterDoc.data().receiptSeq||0) : 0) + 1;
      for(let idx=0; idx<productDocs.length; idx++){
        const pdoc = productDocs[idx]; const item = cartSnapshot[idx];
        tx.update(productRefs[idx], { stock: (pdoc.data().stock||0) - item.qty });
      }
      const kassaData = kassaDoc.data();
      tx.update(kassaRef, { total: (kassaData.total||0) + total });
      tx.set(counterRef, { receiptSeq: nextSeq }, { merge: true });
      const now = new Date();
      const receipt = {
        kassaId: kassaId, kassaAddress: kassaData.address, number: String(nextSeq).padStart(4,'0'),
        items: cartSnapshot.map(i=>({name:i.name, qty:i.qty, price:i.price, emoji:i.emoji})),
        total, date: now.toLocaleDateString('ru-RU'), time: now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      tx.set(receiptRef, receipt);
      return { id: receiptRef.id, ...receipt };
    });
    STATE.cart = []; STATE.modalReceipt = receiptDisplay; showToast('Оплата прошла успешно');
  }catch(err){ showToast(err.message || 'Ошибка оплаты, попробуйте ещё раз', true); }
  STATE.paying = false; render();
}

function renderReceiptModal(r){
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeReceiptModal()">
      <div class="receipt-modal">
        <div class="receipt-top"><div class="r-check">✔</div><h2>Оплата прошла</h2><p>Чек №${r.number || r.id}</p></div>
        <div class="receipt-body">
          <div class="r-meta-row"><span>Касса</span><b>№${r.kassaId}</b></div>
          <div class="r-meta-row"><span>Адрес</span><b>${r.kassaAddress}</b></div>
          <div class="r-meta-row"><span>Дата</span><b>${r.date}</b></div>
          <div class="r-meta-row"><span>Время</span><b>${r.time}</b></div>
          <div class="r-divider"></div>
          ${r.items.map(i=>`<div class="r-item"><span class="ri-name">${i.emoji} ${i.name} <span class="ri-qty">× ${i.qty}</span></span><span class="mono">${money(i.price*i.qty)}</span></div>`).join('')}
          <div class="r-total-row"><span class="rt-label">Итого к оплате</span><span class="rt-num">${money(r.total)}</span></div>
        </div>
        <div class="receipt-foot"><button class="receipt-close-btn" onclick="closeReceiptModal()">Готово</button></div>
      </div>
    </div>`;
}

bootstrap();
</script>
